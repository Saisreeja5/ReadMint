<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/styles.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Vite + React</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
   <!-- ExitCapture Widget -->
<script>
(function(){

  const SITE_KEY = "ccdddcf3-7fd1-4dec-9c30-130e3a3c6be4";
  const API = "https://umujmrvfttpmnytxbqnx.supabase.co/functions/v1";

  let popupShown = false;
  let popupEnabled = false;

  function track(eventType,data){
    fetch(API + "/track-event",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        site_key:SITE_KEY,
        event_type:eventType,
        ...(data||{})
      })
    }).catch(()=>{});
  }

  async function loadConfig(){
    try{
      const res = await fetch(API + "/widget-config?site_key=" + SITE_KEY);
      const cfg = await res.json();
      if(!cfg || !cfg.title) return null;

      sessionStorage.setItem("ec_cfg",JSON.stringify(cfg));
      return cfg;

    }catch(e){
      return null;
    }
  }

  function createPopup(cfg){

    const overlay = document.createElement("div");
    overlay.id="ec-overlay";
    overlay.style.cssText=
      "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999999;display:flex;align-items:center;justify-content:center";

    const popup=document.createElement("div");
    popup.style.cssText=
      "background:"+cfg.background_color+
      ";color:"+cfg.text_color+
      ";max-width:420px;width:90%;padding:24px;border-radius:12px;position:relative;font-family:system-ui,sans-serif";

    const close=document.createElement("button");
    close.innerHTML="✕";
    close.style.cssText=
      "position:absolute;top:8px;right:12px;border:none;background:none;font-size:18px;cursor:pointer;opacity:.6;color:"+cfg.text_color;
    close.onclick=()=>overlay.remove();

    const title=document.createElement("h3");
    title.textContent=cfg.title;
    title.style.cssText="margin:0 0 8px;font-size:20px;font-weight:700";

    const desc=document.createElement("p");
    desc.textContent=cfg.description;
    desc.style.cssText="margin:0 0 16px;font-size:14px;opacity:.8";

    const email=document.createElement("input");
    email.type="email";
    email.placeholder="Enter your email";
    email.style.cssText=
      "width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;color:#000;box-sizing:border-box";

    const btn=document.createElement("button");
    btn.textContent=cfg.button_text;
    btn.style.cssText=
      "width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:"+cfg.text_color+";color:"+cfg.background_color;

    btn.onclick=async function(){

      const value=email.value.trim();

      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return;

      track("popup_click");

      try{

        const res=await fetch(API+"/capture-lead",{
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({
            site_key:SITE_KEY,
            email:value
          })
        });

        const data=await res.json();

        track("lead_capture");

        if(cfg.reward_type==="coupon"){

          popup.innerHTML=
            "<h3 style='margin:0 0 8px'>Your code: "+
            cfg.reward_value+
            "</h3><p style='font-size:14px'>Thanks for subscribing!</p>";

        }else if(cfg.reward_type==="redirect"){

          window.location.href=cfg.reward_value;

        }else if(cfg.reward_type==="download"){

          window.open(cfg.reward_value,"_blank");
          overlay.remove();

        }else{

          popup.innerHTML=
            "<h3>Thanks!</h3><p>You're subscribed.</p>";

        }

      }catch(e){}

    };

    popup.appendChild(close);
    popup.appendChild(title);
    popup.appendChild(desc);
    popup.appendChild(email);
    popup.appendChild(btn);

    overlay.appendChild(popup);

    overlay.onclick=function(e){
      if(e.target===overlay) overlay.remove();
    };

    document.body.appendChild(overlay);
  }

  function enableExitDetection(cfg){

    document.addEventListener("mouseleave",function(e){

      if(e.clientY <= 50 &&
         !popupShown &&
         !sessionStorage.getItem("ec_shown") &&
         popupEnabled){

        popupShown=true;

        sessionStorage.setItem("ec_shown","1");

        track("popup_view");

        createPopup(cfg);

      }

    });

  }

  async function init(){

    const cfg=await loadConfig();

    if(!cfg) return;

    enableExitDetection(cfg);

    setTimeout(()=>{
      popupEnabled=true;
    },5000);

  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",init);
  }else{
    init();
  }

})();
</script>
  </body>
</html>
