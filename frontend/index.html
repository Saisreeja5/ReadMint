<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/styles.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Vite + React</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
   <!-- ExitCapture Widget -->
 <!-- ExitCapture Widget -->
<script>
(function(){
  var sk="7e7a354d-a0fc-4bb3-a51a-920fc087fd8b";
  var api="https://umujmrvfttpmnytxbqnx.supabase.co/functions/v1";
  var shown=false;
  
  function track(t,d){
    fetch(api+"/track-event",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({site_key:sk,event_type:t,...(d||{})})
    }).catch(function(){});
  }
  
  function init(){
    fetch(api+"/widget-config?site_key="+sk)
      .then(function(r){return r.json()})
      .then(function(cfg){
        if(!cfg||!cfg.title)return;
        sessionStorage.setItem("ec_cfg",JSON.stringify(cfg));
        
        document.addEventListener("mouseleave",function(e){
          if(e.clientY<=0&&!shown&&!sessionStorage.getItem("ec_shown")){
            shown=true;
            sessionStorage.setItem("ec_shown","1");
            showPopup(cfg);
          }
        });
      }).catch(function(){});
  }
  
  function showPopup(c){
    track("popup_view");
    var o=document.createElement("div");
    o.id="ec-overlay";
    o.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center";
    
    var p=document.createElement("div");
    p.style.cssText="background:"+c.background_color+";color:"+c.text_color+";max-width:400px;width:90%;border-radius:12px;padding:24px;position:relative;font-family:system-ui,sans-serif";
    
    var x=document.createElement("button");
    x.textContent="✕";
    x.style.cssText="position:absolute;top:8px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:"+c.text_color+";opacity:.6";
    x.onclick=function(){o.remove()};
    
    var h=document.createElement("h3");
    h.textContent=c.title;
    h.style.cssText="margin:0 0 8px;font-size:20px;font-weight:700";
    
    var d=document.createElement("p");
    d.textContent=c.description;
    d.style.cssText="margin:0 0 16px;font-size:14px;opacity:.8";
    
    var i=document.createElement("input");
    i.type="email";
    i.placeholder="Enter your email";
    i.style.cssText="width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;box-sizing:border-box;color:#000;background:#fff";
    
    var b=document.createElement("button");
    b.textContent=c.button_text;
    b.style.cssText="width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:"+c.text_color+";color:"+c.background_color;
    b.onclick=function(){
      var email=i.value.trim();
      if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return;
      track("popup_click");
      fetch(api+"/capture-lead",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({site_key:sk,email:email})
      }).then(function(r){return r.json()}).then(function(res){
        track("lead_capture");
        if(c.reward_type==="coupon"){
          p.innerHTML="<h3 style=\"margin:0 0 8px;font-size:20px;font-weight:700\">Your code: "+c.reward_value+"</h3><p style=\"font-size:14px;opacity:.8\">Thanks for subscribing!</p>";
        }else if(c.reward_type==="redirect"){
          window.location.href=c.reward_value;
        }else if(c.reward_type==="download"){
          window.open(c.reward_value,"_blank");
          o.remove();
        }else{
          p.innerHTML="<h3 style=\"margin:0 0 8px;font-size:20px;font-weight:700\">Thanks!</h3><p style=\"font-size:14px;opacity:.8\">You\'ve been subscribed.</p>";
        }
      }).catch(function(){});
    };
    
    p.appendChild(x);
    p.appendChild(h);
    p.appendChild(d);
    p.appendChild(i);
    p.appendChild(b);
    o.appendChild(p);
    o.onclick=function(e){if(e.target===o)o.remove()};
    document.body.appendChild(o);
  }
  
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",init);
  }else{
    init();
  }
})();
</script>
  </body>
</html>
