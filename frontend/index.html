<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/styles.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Vite + React</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
   <!-- ExitCapture Widget -->
<script>
(function(){

let popupTriggered = false;

function showPopup(){

  if(popupTriggered) return;
  if(sessionStorage.getItem("ec_shown")) return;

  popupTriggered = true;
  sessionStorage.setItem("ec_shown","1");

  console.log("EXIT POPUP TRIGGERED");

  // ===== YOUR POPUP CODE HERE =====
  alert("Wait! Don't leave yet 🚀");

}

function detectExit(){

  document.addEventListener("mouseout",function(e){

    if(!e.relatedTarget && !e.toElement && e.clientY <= 10){

      showPopup();

    }

  });

  document.addEventListener("mouseleave",function(e){

    if(e.clientY <= 10){

      showPopup();

    }

  });

}

function detectScroll(){

  window.addEventListener("scroll",function(){

    const scrollPercent =
      (window.scrollY + window.innerHeight) /
      document.documentElement.scrollHeight;

    if(scrollPercent > 0.8){

      showPopup();

    }

  });

}

function detectIdle(){

  let idleTimer;

  function resetIdle(){

    clearTimeout(idleTimer);

    idleTimer = setTimeout(function(){

      showPopup();

    },15000);

  }

  ["mousemove","keydown","scroll","touchstart"].forEach(function(event){

    window.addEventListener(event,resetIdle);

  });

  resetIdle();

}

function init(){

  detectExit();
  detectScroll();
  detectIdle();

}

if(document.readyState === "loading"){

  document.addEventListener("DOMContentLoaded",init);

}else{

  init();

}

})();
</script>
  </body>
</html>
